name: Release

on:
    push:
        branches: [main]

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Check for tag on current commit
              id: check_tag
              run: |
                  CURRENT_TAGS=$(git tag --points-at HEAD)

                  if [ -n "$CURRENT_TAGS" ]; then
                    LATEST_TAG=$(echo "$CURRENT_TAGS" | head -n1)
                    echo "Found tag on commit: ${LATEST_TAG}"
                  else
                    LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
                    echo "No tag on current commit, using latest: ${LATEST_TAG}"
                  fi

                  if [ -z "$LATEST_TAG" ]; then
                    LATEST_TAG="v1.0.0"
                  fi

                  VERSION=${LATEST_TAG#v}

                  echo "VERSION=${VERSION}" >> $GITHUB_ENV
                  echo "TAG=${LATEST_TAG}" >> $GITHUB_ENV
                  echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ env.TAG }}
                  release_name: Release ${{ env.TAG }}
                  body: |
                      ${{ github.event.head_commit.message }}
                  draft: false
                  prerelease: false

            - name: Upload Dist Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./dist
                  asset_name: dist-${{ env.VERSION }}.zip
                  asset_content_type: application/zip
